    }

    # Next.js API routes (these are implemented in the Next.js app)
    location ~ ^/api/(admin|curriculum|auth|codeforces|mirror|workspace|get-ip|profile|submit-application|training-sheets|submissions|leaderboard|sheets|judge|stats|analyze-complexity|user|recap|views|achievements|news|health|notifications) {
        proxy_pass http://icpchue-frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
