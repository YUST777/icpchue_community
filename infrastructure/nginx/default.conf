# Nginx configuration for Docker
# HTTP -> HTTPS redirect handled by upstream load balancer/Cloudflare

upstream frontend {
    server icpchue-frontend:3000;
}

upstream verdict_frontend {
    server verdict-frontend:3000;
}

upstream backend {
    server icpchue-backend:3001;
}

upstream judge0 {
    server judge0-server:2358;
}

# ===========================================
# ICPCHUE.COM - HTTP -> HTTPS
# ===========================================
server {
    listen 80;
    server_name icpchue.com www.icpchue.com;
    return 301 https://icpchue.com$request_uri;
}

# ===========================================
# VERDICT.RUN - HTTP -> HTTPS
# ===========================================
server {
    listen 80;
    server_name verdict.run www.verdict.run codeforces.verdict.run codeforess.verdict.run;
    return 301 https://$host$request_uri;
}

# ===========================================
# ICPCHUE.COM - SSL
# ===========================================
server {
    listen 443 ssl;
    server_name icpchue.com www.icpchue.com;
    
    ssl_certificate /etc/letsencrypt/live/icpchue.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/icpchue.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers on;
    
    client_max_body_size 50M;

    # Netdata Stub Status
    location /stub_status {
        stub_status;
        allow 127.0.0.1;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        allow 10.0.0.0/8;
        deny all;
    }

    # Profile pictures
    location ^~ /pfps/ {
        root /var/www;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
    }

    # API routes - Next.js
    location ~ ^/api/(admin|curriculum|auth|codeforces|mirror|workspace|get-ip|profile|submit-application|training-sheets|submissions|leaderboard|sheets|judge|stats|analyze-complexity|user|recap|views|achievements|news|health|notifications|track|analytics) {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
    }

    # API routes - Backend
    location /api/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
    }

    # Judge0
    location /judge0/ {
        rewrite ^/judge0/(.*)$ /$1 break;
        proxy_pass http://judge0;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Frontend
    location / {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        
        # Security Headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'wasm-unsafe-eval' https: blob:; style-src 'self' 'unsafe-inline' https:; img-src 'self' data: blob: https:; font-src 'self' data: https:; connect-src 'self' https: wss: blob:; media-src 'self' https: data: blob:; frame-src 'self' https://drive.google.com https://www.youtube.com https://www.google.com https://www.gstatic.com; object-src 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests;" always;
    }
}

# ===========================================
# VERDICT.RUN - SSL
# ===========================================
server {
    listen 443 ssl;
    server_name verdict.run www.verdict.run codeforces.verdict.run codeforess.verdict.run;
    
    ssl_certificate /etc/letsencrypt/live/verdict.run/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/verdict.run/privkey.pem;
    
    client_max_body_size 50M;

    location / {
        proxy_pass http://verdict_frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host verdict.run;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
    }
}
