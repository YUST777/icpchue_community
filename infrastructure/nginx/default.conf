    ssl_prefer_server_ciphers on;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;
    
    client_max_body_size 50M;

    # Profile pictures
    location ^~ /pfps/ {
        root /var/www;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
