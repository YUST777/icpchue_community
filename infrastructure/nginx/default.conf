# Nginx configuration for Docker
# HTTP -> HTTPS redirect handled by upstream load balancer/Cloudflare

upstream frontend {
    server frontend:3000;
}

upstream backend {
    server backend:3001;
}

upstream judge0 {
    server judge0-server:2358;
}

# LEGACY VERDICT.RUN BLOCKS REMOVED

# ===========================================
# ICPCHUE.COM - HTTP (Port 80) - Default
# ===========================================
server {
    listen 80;
    server_name _;
    return 301 https://icpchue.com$request_uri;
}

server {
    listen 80;
    server_name icpchue.com www.icpchue.com _;
    
    client_max_body_size 50M;

    # Netdata Stub Status
    location /stub_status {
        stub_status;
        allow 127.0.0.1;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        allow 10.0.0.0/8;
        deny all;
    }

    # Profile pictures - served directly
    location ^~ /pfps/ {
        root /var/www;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
    }

    # Next.js static files (_next/static) - must be proxied to frontend
    location /_next/static/ {
        proxy_pass http://icpchue-frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Next.js public files (videos, images, etc.)
    location ~ ^/(videos|images|icons|fonts|.*\.(webm|mp4|webp|png|jpg|jpeg|svg|woff|woff2)) {
        proxy_pass http://icpchue-frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Next.js API routes (these are implemented in the Next.js app)
    location ~ ^/api/(admin|curriculum|auth|codeforces|mirror|workspace|get-ip|profile|submit-application|training-sheets|submissions|leaderboard|sheets|judge|stats|analyze-complexity|user|recap|views|achievements|news|health|notifications) {
        proxy_pass http://icpchue-frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Backend API routes (Express - handles /auth, /admin, /profile, etc.)
    location /api/ {
        proxy_pass http://icpchue-backend:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }

    # Judge0 API (internal only, or exposed if needed)
    location /judge0/ {
        rewrite ^/judge0/(.*)$ /$1 break;
        proxy_pass http://judge0;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }


    # Frontend (Next.js)
    location / {
        proxy_pass http://icpchue-frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;

        # Fix for "upstream sent too big header" from Next.js (Supabase large session cookies)
        proxy_buffer_size          128k;
        proxy_buffers              4 256k;
        proxy_busy_buffers_size    256k;

        # Hide upstream CSP to avoid duplication/conflicts
        proxy_hide_header Content-Security-Policy;
        proxy_hide_header X-Frame-Options;

        # CSP - Next.js requires unsafe-inline, WASM needs wasm-unsafe-eval for 3D models
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'wasm-unsafe-eval' https: blob:; style-src 'self' 'unsafe-inline' https:; img-src 'self' data: blob: https:; font-src 'self' data: https:; connect-src 'self' https: blob:; media-src 'self' https: data: blob:; frame-src 'self' https://drive.google.com https://www.youtube.com https://www.google.com https://www.gstatic.com; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests;" always;
        
        # Set X-Frame-Options
        add_header X-Frame-Options "SAMEORIGIN" always;
    }
}

